enable-module-update = false # set this to false if you do not want to receive updates for the module
parallel-jobs = 1
# see https://github.com/nvbangg/revanced-morphe-builder/blob/main/CONFIG.md for more detailed explanations

# Revanced
[YouTube]
enabled = false
version = "auto"
arch = "arm64-v8a"
included-patches = "'Hide ads' 'Video ads' 'Theme' 'Disable resuming Shorts on startup' 'Remove background playback restrictions' 'GmsCore support' 'Spoof video streams' 'Force original audio' 'Video quality'"
exclusive-patches = true
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

[Music]
enabled = false
arch = "arm64-v8a"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"
