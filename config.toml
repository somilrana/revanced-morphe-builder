# Morphe
[YouTube-Morphe]
enabled = true
app-name = "YouTube"
rv-brand = "Morphe"
version = "auto"
arch = "arm64-v8a"
# patches-version = "dev"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
patcher-args = "-e 'Theme' -OdarkThemeBackgroundColor=#121212"
# excluded-patches = "'Custom branding' 'Change header' 'Enable debugging'"
included-patches = "'Hide ads' 'Video ads' 'Video quality' 'Remove background playback restrictions' 'GmsCore support' 'Force original audio' 'Theme' 'Sanitize sharing links' 'Disable Shorts resuming on startup' 'Disable haptic feedback' 'SponsorBlock' 'Bypass URL redirects' 'Spoof video streams'"
exclusive-patches = true
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

[Music-Morphe]
enabled = false
app-name = "YT Music"
rv-brand = "Morphe"
version = "auto"
arch = "arm64-v8a"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
excluded-patches = "'Theme' 'Custom branding' 'Enable debugging' 'Change header'"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"

[Reddit-Morphe]
